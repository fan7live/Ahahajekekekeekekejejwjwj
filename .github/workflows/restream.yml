name: Scrambled Restream

on:
  workflow_dispatch:
    inputs:
      source_url:  { description: 'Source URL', required: true }
      referer:     { description: 'Referer', required: false, default: '' }
      rtmp_url:    { description: 'RTMP URL', required: true }
      stream_key:  { description: 'Stream Key', required: true }
      seed:        { description: 'Shared secret', required: true, default: '987654321' }
      grid:        { description: 'Grid', required: true, default: '10' }
      quality:     { description: 'Quality (original/144/240/360/480/720/1080/1440/2160)', required: true, default: 'original' }
      fps:         { description: 'FPS (original/15/24/30/60/120)', required: true, default: 'original' }
      bitrate:     { description: 'Video Bitrate (auto or e.g. 6000k)', required: true, default: 'auto' }
      is_loop:     { description: 'Loop Video (true/false)', required: true, default: 'false' }
      overlay_url: { description: 'Overlay Image URL', required: false, default: 'none' }

permissions:
  actions: write

jobs:
  restream:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - run: echo "::add-mask::${{ inputs.stream_key }}"

      - name: Install FFmpeg
        run: |
          sudo apt-get install -y -qq ffmpeg || \
            (sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg)
          ffmpeg -version | head -1
          echo "==> FFmpeg ready"

      - name: Probe source
        env:
          SRC:     ${{ inputs.source_url }}
          REFERER: ${{ inputs.referer }}
          QUAL:    ${{ inputs.quality }}
        run: |
          UA="Mozilla/5.0 (Linux; Android 11) AppleWebKit/537.36"
          echo "==> Probing: $SRC"

          DIMS=$(ffprobe -v warning \
            -user_agent "$UA" \
            ${REFERER:+-headers "Referer: $REFERER\r\n"} \
            -select_streams v:0 \
            -show_entries stream=width,height \
            -of csv=p=0:s=x \
            "$SRC" | head -1)

          SRC_W=$(echo "$DIMS" | cut -dx -f1)
          SRC_H=$(echo "$DIMS" | cut -dx -f2)

          if [ -z "$SRC_W" ] || [ -z "$SRC_H" ] || [ "$SRC_W" = "0" ]; then
            echo "Warning: probe failed, defaulting to 1920x1080"
            SRC_W=1920; SRC_H=1080
          else
            echo "==> Detected: ${SRC_W}x${SRC_H}"
          fi

          if [ "$QUAL" != "original" ] && [ -n "$QUAL" ]; then
            SRC_H="$QUAL"
            SRC_W=$(( (SRC_H * 16) / 9 ))
            echo "==> Quality override -> ${SRC_W}x${SRC_H}"
          fi

          HAS_AUD=$(ffprobe -v error \
            -user_agent "$UA" \
            ${REFERER:+-headers "Referer: $REFERER\r\n"} \
            -select_streams a:0 \
            -show_entries stream=index \
            -of csv=p=0 \
            "$SRC" | head -1)

          if [ -z "$HAS_AUD" ]; then
            echo "==> No audio — will generate silence"
            echo "HAVE_AUDIO=false" >> "$GITHUB_ENV"
          else
            echo "==> Audio track found"
            echo "HAVE_AUDIO=true" >> "$GITHUB_ENV"
          fi

          G=${{ inputs.grid }}
          TW=$(( (SRC_W / G) / 4 * 4 ))
          TH=$(( (SRC_H / G) / 4 * 4 ))
          [ "$TW" -eq 0 ] && TW=4
          [ "$TH" -eq 0 ] && TH=4
          W=$((TW * G))
          H=$((TH * G))

          echo "==> Canvas: ${W}x${H} | tile: ${TW}x${TH} | grid: ${G}x${G}"
          echo "SRC_W=$SRC_W" >> "$GITHUB_ENV"
          echo "SRC_H=$SRC_H" >> "$GITHUB_ENV"
          echo "W=$W"         >> "$GITHUB_ENV"
          echo "H=$H"         >> "$GITHUB_ENV"
          echo "TW=$TW"       >> "$GITHUB_ENV"
          echo "TH=$TH"       >> "$GITHUB_ENV"

      - name: Build filter
        env:
          GRID:    ${{ inputs.grid }}
          SEED:    ${{ inputs.seed }}
          OVERLAY: ${{ inputs.overlay_url }}
          FPS:     ${{ inputs.fps }}
          W:       ${{ env.W }}
          H:       ${{ env.H }}
          TW:      ${{ env.TW }}
          TH:      ${{ env.TH }}
          SRC_W:   ${{ env.SRC_W }}
          SRC_H:   ${{ env.SRC_H }}
        run: |
          python3 << 'PY' > filter.txt
          import os
          g           = int(os.environ.get("GRID",    "10"))
          seed        = int(os.environ.get("SEED",    "987654321"))
          W           = int(os.environ.get("W",       "1920"))
          H           = int(os.environ.get("H",       "1080"))
          tw          = int(os.environ.get("TW",      "192"))
          th          = int(os.environ.get("TH",      "108"))
          overlay_url = os.environ.get("OVERLAY", "none").strip()
          fps_input   = os.environ.get("FPS",     "original").strip()
          has_overlay = overlay_url not in ("", "none")
          n           = g * g
          fps_f = "" if fps_input == "original" else f",fps={fps_input}"
          parts = []
          if n == 1:
              src_w = int(os.environ.get("SRC_W", str(W)))
              src_h = int(os.environ.get("SRC_H", str(H)))
              if W != src_w or H != src_h:
                  main_vf = f"[0:v]scale={W}:{H}:flags=fast_bilinear,setsar=1{fps_f}"
              else:
                  main_vf = (f"[0:v]setsar=1{fps_f}" if fps_f else "[0:v]setsar=1")
              if has_overlay:
                  parts.append(f"{main_vf}[v_main]")
                  parts.append(f"movie=overlay.png,scale={W}:{H}:flags=fast_bilinear,format=rgba[over]")
                  parts.append("[v_main][over]overlay=0:0:eof_action=repeat,format=yuv420p[out]")
              else:
                  parts.append(f"{main_vf},format=yuv420p[out]")
          else:
              state = seed & 0xFFFFFFFF
              def rnd():
                  global state
                  state = (state * 1103515245 + 12345) & 0x7FFFFFFF
                  return state
              perm = list(range(n))
              for i in range(n - 1, 0, -1):
                  j = rnd() % (i + 1)
                  perm[i], perm[j] = perm[j], perm[i]
              parts.append(
                  f"[0:v]scale={W}:{H}:flags=bicubic,setsar=1{fps_f},split={n}" +
                  "".join(f"[s{i}]" for i in range(n))
              )
              for i in range(n):
                  parts.append(f"[s{i}]crop={tw}:{th}:{(i%g)*tw}:{(i//g)*th}[c{i}]")
              xin    = "".join(f"[c{perm[o]}]" for o in range(n))
              layout = "|".join(f"{(o%g)*tw}_{(o//g)*th}" for o in range(n))
              parts.append(f"{xin}xstack=inputs={n}:layout={layout}[v_main]")
              if has_overlay:
                  parts.append(f"[1:v]scale={W}:{H}:flags=bicubic[over]")
                  parts.append("[v_main][over]overlay=0:0,format=yuv420p[out]")
              else:
                  parts.append("[v_main]format=yuv420p[out]")
          print(";".join(parts))
          PY
          echo "==> Filter (preview): $(head -c 250 filter.txt)"

      - name: Stream
        env:
          SRC:         ${{ inputs.source_url }}
          RTMP:        ${{ inputs.rtmp_url }}
          KEY:         ${{ inputs.stream_key }}
          REFERER:     ${{ inputs.referer }}
          IS_LOOP:     ${{ inputs.is_loop }}
          OVERLAY_URL: ${{ inputs.overlay_url }}
          GRID:        ${{ inputs.grid }}
          SEED:        ${{ inputs.seed }}
          QUALITY:     ${{ inputs.quality }}
          FPS:         ${{ inputs.fps }}
          BITRATE:     ${{ inputs.bitrate }}
          SRC_H:       ${{ env.SRC_H }}
          HAVE_AUDIO:  ${{ env.HAVE_AUDIO }}
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          REPO:        ${{ github.repository }}
          REF:         ${{ github.ref_name }}
        run: |
          FILTER=$(cat filter.txt)

          echo "==============================="
          echo " Source  : $SRC"
          echo " Platform: $RTMP"
          echo " Size    : ${SRC_H}p | FPS: $FPS | Bitrate: $BITRATE"
          echo " Grid    : $GRID | Loop: $IS_LOOP | Audio: $HAVE_AUDIO"
          echo "==============================="

          if [ "$BITRATE" = "auto" ] || [ -z "$BITRATE" ]; then
            if   [ "$SRC_H" -ge 2160 ]; then VBR="15000k"
            elif [ "$SRC_H" -ge 1440 ]; then VBR="10000k"
            elif [ "$SRC_H" -ge 1080 ]; then VBR="6000k"
            elif [ "$SRC_H" -ge 720  ]; then VBR="3500k"
            elif [ "$SRC_H" -ge 480  ]; then VBR="2000k"
            elif [ "$SRC_H" -ge 360  ]; then VBR="1000k"
            else                              VBR="600k"
            fi
          else
            VBR="$BITRATE"
            echo "$VBR" | grep -qE '^[0-9]+$' && VBR="${VBR}k"
          fi
          BUF=$((${VBR%k} * 2))k
          echo "==> VBR: $VBR | BUF: $BUF"

          if   [ "$SRC_H" -ge 2160 ]; then DEBLOCK="deblock=0,0"
          elif [ "$SRC_H" -ge 1080 ]; then DEBLOCK="deblock=1,1"
          elif [ "$SRC_H" -ge 720  ]; then DEBLOCK="deblock=2,2"
          else                              DEBLOCK="deblock=3,3"
          fi

          if [ "$FPS" = "original" ] || [ -z "$FPS" ]; then
            GVAL=40
          else
            GVAL=$(( FPS * 2 ))
          fi

          if [ -n "$OVERLAY_URL" ] && [ "$OVERLAY_URL" != "none" ]; then
            echo "==> Downloading overlay..."
            curl -sL "$OVERLAY_URL" -o overlay.png \
              && echo "==> Overlay OK ($(du -sh overlay.png | cut -f1))" \
              || echo "==> Overlay download FAILED"
          fi

          if [ "$HAVE_AUDIO" = "false" ]; then
            FILTER="anullsrc=r=44100:cl=stereo[aud_out];$FILTER"
          fi

          WORKFLOW_START=$(date +%s)
          MAX_RUNTIME=$((335 * 60))

          dispatch_new_run() {
            echo "==> [$(date '+%H:%M:%S')] Dispatching new workflow run..."
            PAYLOAD=$(jq -n \
              --arg ref     "$REF" \
              --arg src     "$SRC" \
              --arg referer "$REFERER" \
              --arg rtmp    "$RTMP" \
              --arg key     "$KEY" \
              --arg seed    "$SEED" \
              --arg grid    "$GRID" \
              --arg quality "$QUALITY" \
              --arg fps     "$FPS" \
              --arg bitrate "$BITRATE" \
              --arg is_loop "$IS_LOOP" \
              --arg overlay "$OVERLAY_URL" \
              '{ref:$ref,inputs:{source_url:$src,referer:$referer,rtmp_url:$rtmp,stream_key:$key,seed:$seed,grid:$grid,quality:$quality,fps:$fps,bitrate:$bitrate,is_loop:$is_loop,overlay_url:$overlay}}')
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/actions/workflows/restream.yml/dispatches" \
              -d "$PAYLOAD" \
              && echo "==> Dispatch OK" \
              || echo "==> Dispatch FAILED"
          }

          declare -a FF
          FF=(ffmpeg -hide_banner -loglevel warning)
          FF+=(-fflags +genpts)
          FF+=(-reconnect 1 -reconnect_streamed 1 -reconnect_at_eof 1 -reconnect_delay_max 5)
          FF+=(-user_agent "Mozilla/5.0 (Linux; Android 11) AppleWebKit/537.36")
          [ -n "$REFERER" ] && FF+=(-headers "Referer: $REFERER\r\n")
          FF+=(-thread_queue_size 2048)
          [ "$IS_LOOP" = "true" ] && FF+=(-re -stream_loop -1)
          FF+=(-i "$SRC")
          [ -f overlay.png ] && [ "$GRID" -gt 1 ] && FF+=(-thread_queue_size 1024 -loop 1 -i overlay.png)
          FF+=(-filter_complex "$FILTER")
          FF+=(-map "[out]")
          if [ "$HAVE_AUDIO" = "false" ]; then
            FF+=(-map "[aud_out]")
          else
            FF+=(-map "0:a:0?")
          fi
          FF+=(-c:v libx264 -preset ultrafast -tune zerolatency)
          FF+=(-threads 2 -pix_fmt yuv420p)
          FF+=(-x264-params "${DEBLOCK}:aq-mode=0:psy=0:me=dia:subme=0:trellis=0:partitions=none")
          FF+=(-b:v "$VBR" -maxrate "$VBR" -bufsize "$BUF" -g "$GVAL")
          FF+=(-c:a aac -b:a 128k -ar 44100 -ac 2)
          FF+=(-max_muxing_queue_size 1024)
          FF+=(-f flv "$RTMP/$KEY")

          while true; do
            echo "==> [$(date '+%H:%M:%S')] Starting FFmpeg..."
            "${FF[@]}" &
            FFMPEG_PID=$!

            while kill -0 $FFMPEG_PID 2>/dev/null; do
              sleep 10
              if [ $(( $(date +%s) - WORKFLOW_START )) -ge $MAX_RUNTIME ]; then
                echo "==> [$(date '+%H:%M:%S')] Timeout — switching to new run..."
                kill $FFMPEG_PID 2>/dev/null || true
                wait $FFMPEG_PID 2>/dev/null || true
                dispatch_new_run
                exit 0
              fi
            done

            wait $FFMPEG_PID
            EC=$?
            echo "==> [$(date '+%H:%M:%S')] FFmpeg exited (code: $EC)"

            if [ $(( $(date +%s) - WORKFLOW_START )) -ge $MAX_RUNTIME ]; then
              dispatch_new_run
              exit 0
            fi

            echo "==> Reconnecting in 5s..."
            sleep 5
          done
