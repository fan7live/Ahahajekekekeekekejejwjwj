name: Scrambled Restream

on:
  workflow_dispatch:
    inputs:
      source_url:  { description: 'Source URL', required: true }
      referer:     { description: 'Referer', required: false, default: '' }
      rtmp_url:    { description: 'RTMP URL', required: true }
      stream_key:  { description: 'Stream Key', required: true }
      seed:        { description: 'Shared secret', required: true, default: '987654321' }
      grid:        { description: 'Grid', required: true, default: '10' }
      quality:     { description: 'Quality (original/144/240/360/480/720/1080/1440/2160)', required: true, default: 'original' }
      fps:         { description: 'FPS (original/15/24/30/60/120)', required: true, default: 'original' }
      bitrate:     { description: 'Video Bitrate (auto or e.g. 6000k)', required: true, default: 'auto' }
      is_loop:     { description: 'Loop Video (true/false)', required: true, default: 'false' }
      overlay_url: { description: 'Overlay Image URL', required: false, default: 'none' }

permissions:
  actions: write

jobs:
  restream:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - run: echo "::add-mask::${{ inputs.stream_key }}"

      - name: Install FFmpeg
        run: |
          sudo apt-get install -y -qq ffmpeg && ffmpeg -version | head -1 && exit 0
          echo "==> apt failed, using BtbN..."
          curl -sL https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz -o /tmp/ff.tar.xz
          tar xf /tmp/ff.tar.xz -C /tmp/
          sudo cp /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo cp /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version | head -1

      - name: Probe source
        env:
          SRC:     ${{ inputs.source_url }}
          REFERER: ${{ inputs.referer }}
          QUAL:    ${{ inputs.quality }}
        run: |
          UA="Mozilla/5.0 (Linux; Android 11) AppleWebKit/537.36"
          echo "==> Probing: $SRC"

          PROBE_JSON=$(ffprobe -v error -analyzeduration 3000000 -probesize 2000000 \
            -user_agent "$UA" \
            ${REFERER:+-headers "Referer: $REFERER\r\n"} \
            -print_format json -show_entries stream=codec_type,width,height \
            "$SRC" 2>/dev/null)

          PARSED=$(echo "${PROBE_JSON:-{}}" | python3 -c "import sys,json
try:
    d=json.load(sys.stdin); s=d.get('streams',[])
    v=next((x for x in s if x.get('codec_type')=='video'),{})
    a=any(x.get('codec_type')=='audio' for x in s)
    print(v.get('width',1920),v.get('height',1080),'true' if a else 'false')
except: print(1920,1080,'true')" 2>/dev/null || echo "1920 1080 true")

          OW=$(echo "$PARSED" | awk '{print $1}')
          OH=$(echo "$PARSED" | awk '{print $2}')
          HAS_AUD=$(echo "$PARSED" | awk '{print $3}')
          [ -z "$OW" ] || [ "$OW" = "0" ] && { OW=1920; OH=1080; HAS_AUD=true; }
          echo "==> Source: ${OW}x${OH} | Audio: $HAS_AUD"

          if [ "$QUAL" != "original" ] && [ -n "$QUAL" ]; then
            TH="$QUAL"; TW=$(( (TH * 16) / 9 ))
            echo "==> Target: ${TW}x${TH}"
          else
            TH=$OH; TW=$OW
          fi

          [ "$HAS_AUD" = "true" ] \
            && echo "HAVE_AUDIO=true" >> "$GITHUB_ENV" \
            || echo "HAVE_AUDIO=false" >> "$GITHUB_ENV"

          G=${{ inputs.grid }}
          CTW=$(( (TW / G) / 4 * 4 )); [ "$CTW" -eq 0 ] && CTW=4
          CTH=$(( (TH / G) / 4 * 4 )); [ "$CTH" -eq 0 ] && CTH=4
          W=$((CTW * G)); H=$((CTH * G))
          echo "==> Canvas: ${W}x${H} | tile: ${CTW}x${CTH}"

          echo "W=$W"      >> "$GITHUB_ENV"
          echo "H=$H"      >> "$GITHUB_ENV"
          echo "TW=$CTW"   >> "$GITHUB_ENV"
          echo "TH=$CTH"   >> "$GITHUB_ENV"
          echo "TGT_H=$TH" >> "$GITHUB_ENV"

      - name: Build filter
        env:
          GRID:    ${{ inputs.grid }}
          SEED:    ${{ inputs.seed }}
          OVERLAY: ${{ inputs.overlay_url }}
          FPS:     ${{ inputs.fps }}
          W:       ${{ env.W }}
          H:       ${{ env.H }}
          TW:      ${{ env.TW }}
          TH:      ${{ env.TH }}
        run: |
          python3 << 'PY' > filter.txt
          import os
          g    = int(os.environ.get("GRID", "10"))
          seed = int(os.environ.get("SEED", "987654321"))
          W    = int(os.environ.get("W",    "1920"))
          H    = int(os.environ.get("H",    "1080"))
          tw   = int(os.environ.get("TW",   "192"))
          th   = int(os.environ.get("TH",   "108"))
          ov   = os.environ.get("OVERLAY", "none").strip()
          fps  = os.environ.get("FPS",     "original").strip()
          has_ov = ov not in ("", "none")
          n      = g * g
          fps_f  = "" if fps == "original" else f",fps={fps}"
          SC     = f"scale={W}:{H}:flags=fast_bilinear,setsar=1"
          parts  = []

          if n == 1:
              if has_ov:
                  parts.append(f"[0:v]{SC}{fps_f}[vm]")
                  parts.append(f"[1:v]{SC},format=rgba[ov]")
                  parts.append("[vm][ov]overlay=0:0:eof_action=repeat,format=yuv420p[out]")
              else:
                  parts.append(f"[0:v]{SC}{fps_f},format=yuv420p[out]")
          else:
              state = seed & 0xFFFFFFFF
              def rnd():
                  global state
                  state = (state * 1103515245 + 12345) & 0x7FFFFFFF
                  return state
              perm = list(range(n))
              for i in range(n-1, 0, -1):
                  j = rnd() % (i+1)
                  perm[i], perm[j] = perm[j], perm[i]

              if has_ov:
                  parts.append(f"[0:v]{SC}{fps_f}[vb]")
                  parts.append(f"[1:v]{SC},format=rgba[ov]")
                  parts.append("[vb][ov]overlay=0:0:eof_action=repeat[vs]")
                  parts.append(f"[vs]split={n}" + "".join(f"[s{i}]" for i in range(n)))
              else:
                  parts.append(f"[0:v]{SC}{fps_f},split={n}" + "".join(f"[s{i}]" for i in range(n)))

              for i in range(n):
                  parts.append(f"[s{i}]crop={tw}:{th}:{(i%g)*tw}:{(i//g)*th}[c{i}]")

              xin    = "".join(f"[c{perm[o]}]" for o in range(n))
              layout = "|".join(f"{(o%g)*tw}_{(o//g)*th}" for o in range(n))
              parts.append(f"{xin}xstack=inputs={n}:layout={layout},format=yuv420p[out]")

          print(";".join(parts))
          PY
          echo "==> Filter:"; cat filter.txt

      - name: Stream
        env:
          SRC:         ${{ inputs.source_url }}
          RTMP:        ${{ inputs.rtmp_url }}
          KEY:         ${{ inputs.stream_key }}
          REFERER:     ${{ inputs.referer }}
          IS_LOOP:     ${{ inputs.is_loop }}
          OVERLAY_URL: ${{ inputs.overlay_url }}
          GRID:        ${{ inputs.grid }}
          SEED:        ${{ inputs.seed }}
          QUALITY:     ${{ inputs.quality }}
          FPS:         ${{ inputs.fps }}
          BITRATE:     ${{ inputs.bitrate }}
          TGT_H:       ${{ env.TGT_H }}
          HAVE_AUDIO:  ${{ env.HAVE_AUDIO }}
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          REPO:        ${{ github.repository }}
          REF:         ${{ github.ref_name }}
        run: |
          FILTER=$(cat filter.txt)

          # استخراج اسم ملف workflow الصحيح
          WORKFLOW_FILE=$(basename "$GITHUB_WORKFLOW")

          echo "==============================="
          echo " Src  : $SRC | ${TGT_H}p"
          echo " RTMP : $RTMP"
          echo " Grid : $GRID | FPS: $FPS | Loop: $IS_LOOP"
          echo "==============================="

          # ── Bitrate ─────────────────────────
          if [ "$BITRATE" = "auto" ] || [ -z "$BITRATE" ]; then
            if   [ "$TGT_H" -ge 2160 ]; then VBR="12000k"
            elif [ "$TGT_H" -ge 1440 ]; then VBR="8000k"
            elif [ "$TGT_H" -ge 1080 ]; then VBR="4500k"
            elif [ "$TGT_H" -ge 720  ]; then VBR="3000k"
            elif [ "$TGT_H" -ge 480  ]; then VBR="1800k"
            elif [ "$TGT_H" -ge 360  ]; then VBR="900k"
            else                              VBR="500k"
            fi
          else
            VBR="$BITRATE"
            echo "$VBR" | grep -qE '^[0-9]+$' && VBR="${VBR}k"
          fi
          BUF=$((${VBR%k} * 2))k
          [ "$FPS" = "original" ] || [ -z "$FPS" ] && GVAL=40 || GVAL=$(( FPS * 2 ))
          echo "==> VBR: $VBR | BUF: $BUF | GOP: $GVAL"

          # ── Overlay ─────────────────────────
          HAS_OV=false
          if [ -n "$OVERLAY_URL" ] && [ "$OVERLAY_URL" != "none" ]; then
            curl -sL "$OVERLAY_URL" -o overlay.png \
              && { HAS_OV=true; echo "==> Overlay OK"; } \
              || echo "==> Overlay FAILED"
          fi

          # ── Audio fallback ───────────────────
          [ "$HAVE_AUDIO" = "false" ] && FILTER="anullsrc=r=44100:cl=stereo[aud];$FILTER"

          # ── Auto-restart (بدون jq) ─────────
          T0=$(date +%s); MAX=$((335 * 60))

          dispatch_new_run() {
            echo "==> Dispatching new run..."
            PAYLOAD="{\"ref\":\"$REF\",\"inputs\":{\"source_url\":\"$SRC\",\"referer\":\"$REFERER\",\"rtmp_url\":\"$RTMP\",\"stream_key\":\"$KEY\",\"seed\":\"$SEED\",\"grid\":\"$GRID\",\"quality\":\"$QUALITY\",\"fps\":\"$FPS\",\"bitrate\":\"$BITRATE\",\"is_loop\":\"$IS_LOOP\",\"overlay_url\":\"$OVERLAY_URL\"}}"
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_FILE/dispatches" \
              -d "$PAYLOAD" && echo "==> Dispatch OK" || echo "==> Dispatch FAILED"
          }

          # ── FFmpeg array ─────────────────────
          declare -a FF
          FF=(ffmpeg -hide_banner -loglevel warning -fflags +genpts)
          FF+=(-reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5)
          FF+=(-user_agent "Mozilla/5.0 (Linux; Android 11) AppleWebKit/537.36")
          [ -n "$REFERER" ] && FF+=(-headers "Referer: $REFERER\r\n")
          FF+=(-thread_queue_size 512)
          FF+=(-re)                                        # حيوي جداً
          [ "$IS_LOOP" = "true" ] && FF+=(-stream_loop -1)
          FF+=(-i "$SRC")
          [ "$HAS_OV" = "true" ] && FF+=(-thread_queue_size 512 -loop 1 -i overlay.png)
          FF+=(-filter_complex "$FILTER" -map "[out]")
          [ "$HAVE_AUDIO" = "false" ] && FF+=(-map "[aud]") || FF+=(-map "0:a:0?")
          FF+=(-c:v libx264 -preset ultrafast -tune zerolatency -threads 2 -pix_fmt yuv420p)
          FF+=(-x264-params "aq-mode=0:psy=0")
          FF+=(-sc_threshold 0)
          FF+=(-b:v "$VBR" -maxrate "$VBR" -bufsize "$BUF" -g "$GVAL")
          FF+=(-c:a aac -b:a 128k -ar 44100 -ac 2 -max_muxing_queue_size 512)
          FF+=(-f flv "$RTMP/$KEY")

          # ── Stream loop ──────────────────────
          while true; do
            echo "==> [$(date '+%H:%M:%S')] Starting FFmpeg..."
            "${FF[@]}" &
            FP=$!; TICK=0

            while kill -0 $FP 2>/dev/null; do
              sleep 10; TICK=$((TICK+1))
              [ $((TICK % 12)) -eq 0 ] && echo "==> [$(date '+%H:%M:%S')] ✅ $(( ($(date +%s)-T0)/60 ))min"
              if [ $(( $(date +%s)-T0 )) -ge $MAX ]; then
                kill $FP 2>/dev/null; wait $FP 2>/dev/null
                dispatch_new_run; exit 0
              fi
            done

            wait $FP; EC=$?
            echo "==> [$(date '+%H:%M:%S')] FFmpeg exited (code: $EC)"
            [ $(( $(date +%s)-T0 )) -ge $MAX ] && { dispatch_new_run; exit 0; }
            sleep 5
          done
