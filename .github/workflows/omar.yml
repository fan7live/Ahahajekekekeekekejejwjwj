name: "بث يوتيوب - 4K HEVC بدون ترميز"

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط المصدر (HLS)'
        required: true
        default: 'http://tv.business-cdn-8k.com/live/503dc9e25f02/92d1a3bb8a/2023294.m3u8'
      rtmp_base:
        description: 'رابط RTMP يوتيوب (rtmp://a.rtmp.youtube.com/live2)'
        required: true
        default: 'rtmp://a.rtmp.youtube.com/live2'
      stream_key:
        description: 'مفتاح البث في يوتيوب'
        required: true
        default: 'xxxx-xxxx-xxxx-xxxx'

jobs:
  youtube_copy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: تثبيت ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: تمرير البث كما هو
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          RTMP_BASE: ${{ inputs.rtmp_base }}
          STREAM_KEY: ${{ inputs.stream_key }}
        run: |
          OUTPUT_URL="${RTMP_BASE}/${STREAM_KEY}"
          ffmpeg -re -i "$SOURCE_URL" \
            -c copy \
            -f flv "$OUTPUT_URL"
