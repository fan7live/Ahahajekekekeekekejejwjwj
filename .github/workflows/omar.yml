name: "بث 1080p 60fps لفيسبوك - أقصى جودة (ultrafast) + شعار"

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط المصدر (4K HLS)'
        required: true
        default: 'http://tv.business-cdn-8k.com/live/503dc9e25f02/92d1a3bb8a/2023294.m3u8'
      rtmp_base:
        description: 'رابط RTMP لفيسبوك (rtmps://live-api-s.facebook.com:443/rtmp)'
        required: true
        default: 'rtmps://live-api-s.facebook.com:443/rtmp'
      stream_key:
        description: 'مفتاح البث الدائم لفيسبوك'
        required: true
        default: 'FB-XXXXXXXXXXXXXX'
      logo_url:
        description: 'رابط صورة الشعار (اختياري، اتركه فارغاً إن لم ترد شعار)'
        required: false
        default: ''

jobs:
  stream_fb_max_with_logo:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: تثبيت ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: بث فيسبوك عالي الجودة مع شعار (إن وجد)
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          RTMP_BASE: ${{ inputs.rtmp_base }}
          STREAM_KEY: ${{ inputs.stream_key }}
          LOGO_URL: ${{ inputs.logo_url }}
        run: |
          OUTPUT_URL="${RTMP_BASE}/${STREAM_KEY}"

          if [ -n "$LOGO_URL" ]; then
            echo "تحميل صورة الشعار..."
            curl -L --max-time 30 -o logo.png "$LOGO_URL" || { echo "فشل تحميل الصورة"; exit 1; }
            echo "بدء البث مع الشعار..."
            ffmpeg -re -fflags +genpts -i "$SOURCE_URL" -i logo.png \
              -filter_complex "[1:v]scale=1920:1080[logo];[0:v][logo]overlay=0:0" \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v 9000k -maxrate 9500k -bufsize 18000k \
              -s 1920x1080 -r 60 -g 120 \
              -c:a aac -b:a 192k -ar 48000 -ac 2 \
              -map [v] -map 0:a \
              -f flv "$OUTPUT_URL"
          else
            echo "بدء البث بدون شعار..."
            ffmpeg -re -fflags +genpts -i "$SOURCE_URL" \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v 9000k -maxrate 9500k -bufsize 18000k \
              -s 1920x1080 -r 60 -g 120 \
              -c:a aac -b:a 192k -ar 48000 -ac 2 \
              -f flv "$OUTPUT_URL"
          fi
