name: "بث OK.ru - 1080p 60fps (9000kbps) + شعار + 24 ساعة"

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط المصدر (4K HLS)'
        required: true
        default: 'http://tv.business-cdn-8k.com/live/3169f822cf0e/112a2eb58f/544456.m3u8'
      rtmp_base:
        description: 'رابط RTMP لـ OK.ru'
        required: true
        default: 'rtmp://vsu.okcdn.ru/input'
      stream_key:
        description: 'مفتاح البث'
        required: true
        default: 'مفتاح_البث_الخاص_بك'
      logo_url:
        description: 'رابط صورة الشعار'
        required: false
        default: 'https://e.top4top.io/p_3818nc1gm1.png'

jobs:
  ok_ru_1080p_loop:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: تثبيت ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: بث مستمر مع إعادة تشغيل تلقائية
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          RTMP_BASE: ${{ inputs.rtmp_base }}
          STREAM_KEY: ${{ inputs.stream_key }}
          LOGO_URL: ${{ inputs.logo_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_ID: ${{ github.workflow }}
          REF: ${{ github.ref_name }}
        run: |
          OUTPUT_URL="${RTMP_BASE}/${STREAM_KEY}"
          SELF_RUN_URL="https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_ID}/dispatches"

          if [ -n "$LOGO_URL" ]; then
            echo "تحميل الشعار..."
            curl -L --max-time 30 -o logo.png "$LOGO_URL" || { echo "فشل تحميل الشعار"; exit 1; }
          fi

          MAX_DURATION=$((5*3600 + 40*60))

          while true; do
            echo "بدء / إعادة تشغيل البث..."
            START_TIME=$(date +%s)

            if [ -n "$LOGO_URL" ]; then
              ffmpeg -re -fflags +genpts -i "$SOURCE_URL" \
                -filter_complex \
                  "[0:v]scale=1920:1080,setsar=1[bg]; \
                   movie=logo.png,scale=1920:1080:flags=fast_bilinear,setsar=1,format=rgba[logo]; \
                   [bg][logo]overlay=0:0:eof_action=repeat,format=yuv420p[v]" \
                -c:v libx264 -preset ultrafast -tune zerolatency \
                -b:v 9000k -maxrate 9500k -bufsize 18000k \
                -r 60 -g 120 \
                -c:a aac -b:a 192k -ar 48000 -ac 2 \
                -map "[v]" -map 0:a \
                -f flv "$OUTPUT_URL" &
            else
              ffmpeg -re -fflags +genpts -i "$SOURCE_URL" \
                -c:v libx264 -preset ultrafast -tune zerolatency \
                -b:v 9000k -maxrate 9500k -bufsize 18000k \
                -s 1920x1080 -r 60 -g 120 \
                -c:a aac -b:a 192k -ar 48000 -ac 2 \
                -f flv "$OUTPUT_URL" &
            fi
            FFMPEG_PID=$!

            while true; do
              sleep 10
              NOW=$(date +%s)
              ELAPSED=$((NOW - START_TIME))
              if [ $ELAPSED -ge $MAX_DURATION ]; then
                echo "اقترب انتهاء الدورة. إعادة تشغيل الـ workflow..."
                kill $FFMPEG_PID 2>/dev/null || true
                curl -X POST \
                  -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "$SELF_RUN_URL" \
                  -d "{\"ref\":\"$REF\",\"inputs\":{\"source_url\":\"$SOURCE_URL\",\"rtmp_base\":\"$RTMP_BASE\",\"stream_key\":\"$STREAM_KEY\",\"logo_url\":\"$LOGO_URL\"}}"
                echo "تم طلب دورة جديدة. إنهاء."
                exit 0
              fi
              if ! kill -0 $FFMPEG_PID 2>/dev/null; then
                echo "توقف ffmpeg. إعادة تشغيله..."
                break
              fi
            done
            sleep 2
          done
