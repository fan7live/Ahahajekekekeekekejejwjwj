name: "🔴 OMA Streaming"

on:
  workflow_dispatch:
    inputs:
      stream_id:
        description: 'Stream ID'
        required: false
        default: ''
      stream_name:
        description: 'Stream Name'
        required: false
        default: 'Live Stream'
      source_url:
        description: 'Source URL'
        required: true
        default: ''
      rtmp_url:
        description: 'RTMP URL'
        required: true
        default: ''
      stream_key:
        description: 'Stream Key'
        required: true
        default: ''
      logo_url:
        description: 'Logo URL'
        required: false
        default: ''
      quality:
        description: 'Quality (e.g. 1920x1080 or source)'
        required: false
        default: 'source'
      fps:
        description: 'FPS (e.g. 60 or source)'
        required: false
        default: 'source'
      video_bitrate:
        description: 'Video Bitrate (e.g. 9000k or source)'
        required: false
        default: 'source'
      audio_bitrate:
        description: 'Audio Bitrate'
        required: false
        default: '192k'
      user_agent:
        description: 'User Agent'
        required: false
        default: ''
      referer:
        description: 'Referer Header'
        required: false
        default: ''
      origin:
        description: 'Origin Header'
        required: false
        default: ''
      cookies:
        description: 'Cookies'
        required: false
        default: ''

jobs:
  stream:
    name: "🔴 ${{ inputs.stream_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write

    steps:
      - name: Install FFmpeg
        run: |
          echo "📦 Installing FFmpeg..."
          curl -fL --retry 3 \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" \
            -o ffmpeg.tar.xz
          tar xf ffmpeg.tar.xz
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version 2>&1 | head -1

      - name: Start Streaming
        env:
          SOURCE_URL:    ${{ inputs.source_url }}
          RTMP_URL:      ${{ inputs.rtmp_url }}
          STREAM_KEY:    ${{ inputs.stream_key }}
          LOGO_URL:      ${{ inputs.logo_url }}
          QUALITY:       ${{ inputs.quality }}
          FPS:           ${{ inputs.fps }}
          VIDEO_BITRATE: ${{ inputs.video_bitrate }}
          AUDIO_BITRATE: ${{ inputs.audio_bitrate }}
          USER_AGENT:    ${{ inputs.user_agent }}
          REFERER:       ${{ inputs.referer }}
          ORIGIN:        ${{ inputs.origin }}
          COOKIES:       ${{ inputs.cookies }}
          STREAM_NAME:   ${{ inputs.stream_name }}
          STREAM_ID:     ${{ inputs.stream_id }}
          GH_TOKEN:      ${{ secrets.OMA_GITHUB_TOKEN }}
          REPO:          ${{ github.repository }}
          REF:           ${{ github.ref_name }}
          WORKFLOW_FILE: "okru.yml"
        run: |
          OUTPUT="${RTMP_URL}/${STREAM_KEY}"
          DISPATCH="https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches"
          MAX=$((5*3600 + 40*60))
          INTERVAL=600
          T0=$(date +%s)

          HAS_LOGO=0
          if [ -n "${LOGO_URL:-}" ]; then
            echo "⬇️ Downloading logo..."
            if curl -fL --max-time 30 -o logo.png "${LOGO_URL}" 2>/dev/null; then
              HAS_LOGO=1
              echo "✅ Logo ready"
            else
              echo "⚠️ Logo download failed"
            fi
          fi

          build() {
            local -a C
            local H=""
            C+=(-re -fflags +genpts -analyzeduration 3000000 -probesize 2000000)
            [ -n "${USER_AGENT:-}" ] && C+=(-user_agent "${USER_AGENT}")
            [ -n "${REFERER:-}"    ] && H+="Referer: ${REFERER}\r\n"
            [ -n "${ORIGIN:-}"     ] && H+="Origin: ${ORIGIN}\r\n"
            [ -n "${COOKIES:-}"    ] && H+="Cookie: ${COOKIES}\r\n"
            [ -n "${H}"            ] && C+=(-headers "${H}")
            C+=(-i "${SOURCE_URL}")
            local SF="setsar=1"
            if [ "${QUALITY:-source}" != "source" ] && [ -n "${QUALITY:-}" ]; then
              SF="scale=$(echo "${QUALITY}" | tr 'x' ':'):flags=fast_bilinear,setsar=1"
            fi
            if [ "${HAS_LOGO}" = "1" ]; then
              C+=(-filter_complex "[0:v]${SF}[bg];movie=logo.png[logo];[bg][logo]scale2ref=iw:ih:flags=fast_bilinear,format=rgba[logo];[bg][logo]overlay=0:0:eof_action=repeat,format=yuv420p[v]")
            else
              C+=(-filter_complex "[0:v]${SF},format=yuv420p[v]")
            fi
            C+=(-map "[v]" -map 0:a)
            C+=(-c:v libx264 -preset ultrafast -tune zerolatency)
            if [ "${VIDEO_BITRATE:-source}" != "source" ] && [ -n "${VIDEO_BITRATE:-}" ]; then
              local VN="${VIDEO_BITRATE%k}"
              C+=(-b:v "${VIDEO_BITRATE}" -maxrate "${VIDEO_BITRATE}" -bufsize "$((VN*2))k")
            fi
            if [ "${FPS:-source}" != "source" ] && [ -n "${FPS:-}" ]; then
              C+=(-r "${FPS}" -g "$((FPS*2))" -sc_threshold 0)
            fi
            C+=(-c:a aac -b:a "${AUDIO_BITRATE:-192k}" -ar 48000 -ac 2)
            C+=(-f flv "${OUTPUT}")
            printf '%s\0' "${C[@]}"
          }

          while true; do
            echo "🚀 FFmpeg start — $(date '+%T')"
            CS=$(date +%s)
            mapfile -d '' ARGS < <(build)
            ffmpeg "${ARGS[@]}" &
            PID=$!
            echo "📡 PID: ${PID}"

            while true; do
              sleep 10
              NOW=$(date +%s)
              TOT=$((NOW - T0))
              CYC=$((NOW - CS))

              if [ ${TOT} -ge ${MAX} ]; then
                echo "⏰ Dispatching new run..."
                kill ${PID} 2>/dev/null || true
                jq -nc \
                  --arg ref "${REF}"         --arg sid "${STREAM_ID}"    \
                  --arg sn  "${STREAM_NAME}" --arg su  "${SOURCE_URL}"   \
                  --arg ru  "${RTMP_URL}"    --arg sk  "${STREAM_KEY}"   \
                  --arg lu  "${LOGO_URL}"    --arg q   "${QUALITY}"      \
                  --arg f   "${FPS}"         --arg vb  "${VIDEO_BITRATE}" \
                  --arg ab  "${AUDIO_BITRATE}" --arg ua "${USER_AGENT}"  \
                  --arg rf  "${REFERER}"     --arg og  "${ORIGIN}"       \
                  --arg ck  "${COOKIES}"     \
                  '{ref:$ref,inputs:{stream_id:$sid,stream_name:$sn,source_url:$su,rtmp_url:$ru,stream_key:$sk,logo_url:$lu,quality:$q,fps:$f,video_bitrate:$vb,audio_bitrate:$ab,user_agent:$ua,referer:$rf,origin:$og,cookies:$ck}}' \
                | curl -sf -X POST \
                    -H "Authorization: token ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    -H "Content-Type: application/json" \
                    "${DISPATCH}" -d @-
                echo "✅ New run dispatched. Exiting."
                exit 0
              fi

              if [ ${CYC} -ge ${INTERVAL} ]; then
                echo "🔄 Periodic restart..."
                kill ${PID} 2>/dev/null || true
                break
              fi

              if ! kill -0 ${PID} 2>/dev/null; then
                echo "⚠️ FFmpeg stopped, restarting..."
                break
              fi
            done

            wait ${PID} 2>/dev/null || true
            sleep 2
          done
