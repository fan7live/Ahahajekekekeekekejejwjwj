name: Cancel and Delete All Workflow Runs

on:
  workflow_dispatch: # يتيح لك تشغيل السكريبت يدوياً بضغطة زر

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Run Cleanup Script
        env:
          # هنا يقرأ السكريبت التوكين من الـ Secrets بشكل مخفي وآمن تماماً
          GH_TOKEN: ${{ secrets.MY_CLEANUP_TOKEN }}
        run: |
          # التحقق من أنك قمت بإضافة التوكين في الإعدادات بشكل صحيح
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ خطأ: لم يتم العثور على التوكين المسمى MY_CLEANUP_TOKEN في الـ Secrets!"
            echo "يرجى مراجعة الخطوات وإضافته في إعدادات المستودع أولاً."
            exit 1
          fi

          REPO="${{ github.repository }}"
          
          echo "🔄 1. جاري إيقاف جميع الـ Workflows النشطة أو المنتظرة..."
          for status in in_progress queued; do
            runs=$(gh run list -R "$REPO" --status "$status" --json databaseId --jq '.[].databaseId' 2>/dev/null) || true
            for run in $runs; do
              echo "🚫 إيقاف التشغيل رقم: $run"
              gh run cancel -R "$REPO" "$run" || true
            done
          done

          echo "⏳ الانتظار 5 ثوانٍ للتأكد من اكتمال الإلغاء..."
          sleep 5

          echo "🗑️ 2. جاري حذف تاريخ جميع الـ Workflow runs..."
          # يجلب أول 100 تشغيل لحذفها
          runs=$(gh run list -R "$REPO" --limit 100 --json databaseId --jq '.[].databaseId' 2>/dev/null) || true
          
          if [ -z "$runs" ]; then
            echo "✅ لا توجد مسارات عمل متبقية لحذفها."
          else
            for run in $runs; do
              echo "❌ حذف السجل رقم: $run"
              gh run delete -R "$REPO" "$run" --yes || true
            done
            echo "✨ تم تنظيف وإيقاف جميع الـ Workflows بنجاح!"
          fi
