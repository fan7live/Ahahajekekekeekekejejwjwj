name: Cancel And Delete Runs

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Cancel running workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          # إلغاء جميع الـ runs الجارية
          for RUN_ID in $(gh api repos/$REPO/actions/runs \
            --jq '.workflow_runs[] | select(.status=="in_progress" or .status=="queued") | .id'); do

            echo "Cancelling $RUN_ID"
            gh api -X POST repos/$REPO/actions/runs/$RUN_ID/cancel
          done

      - name: Delete workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          # حذف جميع الـ runs
          for RUN_ID in $(gh api repos/$REPO/actions/runs \
            --paginate \
            --jq '.workflow_runs[].id'); do

            echo "Deleting $RUN_ID"
            gh api -X DELETE repos/$REPO/actions/runs/$RUN_ID
          done
