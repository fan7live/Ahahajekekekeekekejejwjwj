name: "Oma Streaming Engine Pro"
run-name: ${{ inputs.stream_name }}

on:
  workflow_dispatch:
    inputs:
      stream_name:
        description: 'اسم البث'
        required: true
      source_url:
        description: 'رابط المصدر'
        required: true
      rtmp_url:
        description: 'رابط RTMP'
        required: true
      stream_key:
        description: 'مفتاح البث'
        required: true
      logo_url:
        description: 'رابط الشعار'
        required: false
      resolution:
        description: 'الجودة'
        default: 'source'
      fps:
        description: 'الفريمات'
        default: 'source'
      bitrate:
        description: 'البيتريت'
        default: 'source'
      user_agent:
        description: 'User Agent'
        required: false
      referer:
        description: 'Referer'
        required: false
      origin:
        description: 'Origin'
        required: false

jobs:
  streaming_job:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write
    steps:
      - name: تثبيت شبكة FFmpeg المستقرة
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz -o ffmpeg.tar.xz
          tar xf ffmpeg.tar.xz
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/

      - name: إطلاق معالجة البث الذكي ونظام الطوارئ
        env:
          STREAM_NAME: ${{ inputs.stream_name }}
          SOURCE_URL: ${{ inputs.source_url }}
          RTMP_URL: ${{ inputs.rtmp_url }}
          STREAM_KEY: ${{ inputs.stream_key }}
          LOGO_URL: ${{ inputs.logo_url }}
          RES: ${{ inputs.resolution }}
          FPS: ${{ inputs.fps }}
          BITRATE: ${{ inputs.bitrate }}
          UA: ${{ inputs.user_agent }}
          REF: ${{ inputs.referer }}
          ORIGIN: ${{ inputs.origin }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF_BRANCH: ${{ github.ref_name }}
        run: |
          OUTPUT_URL="${RTMP_URL}/${STREAM_KEY}"
          if [[ "$RTMP_URL" == */ ]]; then OUTPUT_URL="${RTMP_URL}${STREAM_KEY}"; fi

          echo "🎯 تشغيل البث الأسطوري: $STREAM_NAME"
          
          # تجهيز متطلبات الهيدرز والشبكة
          HEADERS=""
          if [ -n "$REF" ] && [ "$REF" != "null" ]; then HEADERS="${HEADERS}Referer: ${REF}\r\n"; fi
          if [ -n "$ORIGIN" ] && [ "$ORIGIN" != "null" ]; then HEADERS="${HEADERS}Origin: ${ORIGIN}\r\n"; fi

          # التحقق من وجود لوجو وتحميله
          HAS_LOGO=false
          if [ -n "$LOGO_URL" ] && [ "$LOGO_URL" != "null" ] && [ "$LOGO_URL" != "" ]; then
            curl -L -s -o logo.png "$LOGO_URL" && HAS_LOGO=true
          fi

          # بناء الفلاتر الرسومية ودعم التمطيط الكامل للشاشة عبر scale2ref
          V_FILTERS=""
          if [ "$RES" != "source" ]; then
             V_FILTERS="scale=$RES"
          fi
          if [ "$FPS" != "source" ]; then
             if [ -n "$V_FILTERS" ]; then V_FILTERS="$V_FILTERS,fps=$FPS"; else V_FILTERS="fps=$FPS"; fi
          fi

          # ==============================================================
          # 1. بناء أمر البث الأساسي (كما هو بأسلوبك دون تغيير)
          # ==============================================================
          FFMPEG_MAIN_CMD="ffmpeg -re"
          if [ -n "$UA" ] && [ "$UA" != "null" ]; then FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -user_agent \"$UA\""; fi
          if [ -n "$HEADERS" ]; then FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -headers \"$HEADERS\""; fi
          
          FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -fflags +genpts -i \"$SOURCE_URL\""

          if [ "$HAS_LOGO" = true ]; then
             FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -i logo.png"
             if [ -n "$V_FILTERS" ]; then
                FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -filter_complex \"[0:v]${V_FILTERS},setsar=1[bg];[1:v][bg]scale2ref=iw:ih[logo][bg];[bg][logo]overlay=0:0:eof_action=repeat[v]\" -map \"[v]\" -map 0:a"
             else
                FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -filter_complex \"[0:v]setsar=1[bg];[1:v][bg]scale2ref=iw:ih[logo][bg];[bg][logo]overlay=0:0:eof_action=repeat[v]\" -map \"[v]\" -map 0:a"
             fi
             FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -c:v libx264 -preset ultrafast -tune zerolatency"
          else
             if [ -n "$V_FILTERS" ]; then
                FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -vf \"$V_FILTERS\" -c:v libx264 -preset ultrafast -tune zerolatency"
             else
                if [ "$BITRATE" == "source" ]; then
                   FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -c:v copy"
                else
                   FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -c:v libx264 -preset ultrafast -tune zerolatency"
                fi
             fi
             FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -map 0:v -map 0:a"
          fi

          if [ "$BITRATE" != "source" ]; then
             FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -b:v $BITRATE -maxrate $BITRATE -bufsize $(( ${BITRATE%k} * 2 ))k"
          fi

          FFMPEG_MAIN_CMD="$FFMPEG_MAIN_CMD -c:a aac -b:a 128k -ar 44100 -f flv \"$OUTPUT_URL\""

          # ==============================================================
          # 2. بناء أمر بث الطوارئ (مع التكرار وسحب جودة 1080p)
          # ==============================================================
          FALLBACK_URL="https://stream.mux.com/flpPLp41zTvICKo8nbh3s5K2CNPSI5D8KStGqVLogkI.m3u8?redundant_streams=true"
          
          FFMPEG_FALLBACK_CMD="ffmpeg -re -stream_loop -1 -fflags +genpts -i \"$FALLBACK_URL\""

          if [ "$HAS_LOGO" = true ]; then
             FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -i logo.png"
             if [ -n "$V_FILTERS" ]; then
                FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -filter_complex \"[0:v:0]${V_FILTERS},setsar=1[bg];[1:v][bg]scale2ref=iw:ih[logo][bg];[bg][logo]overlay=0:0:eof_action=repeat[v]\" -map \"[v]\" -map 0:a:0"
             else
                FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -filter_complex \"[0:v:0]setsar=1[bg];[1:v][bg]scale2ref=iw:ih[logo][bg];[bg][logo]overlay=0:0:eof_action=repeat[v]\" -map \"[v]\" -map 0:a:0"
             fi
             FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -c:v libx264 -preset ultrafast -tune zerolatency"
          else
             if [ -n "$V_FILTERS" ]; then
                FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -vf \"$V_FILTERS\" -c:v libx264 -preset ultrafast -tune zerolatency -map 0:v:0 -map 0:a:0"
             else
                FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -c:v libx264 -preset ultrafast -tune zerolatency -map 0:v:0 -map 0:a:0"
             fi
          fi

          if [ "$BITRATE" != "source" ]; then
             FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -b:v $BITRATE -maxrate $BITRATE -bufsize $(( ${BITRATE%k} * 2 ))k"
          fi

          FFMPEG_FALLBACK_CMD="$FFMPEG_FALLBACK_CMD -c:a aac -b:a 128k -ar 44100 -f flv \"$OUTPUT_URL\""

          # ==============================================================
          # 3. محرك الإدارة والمراقبة الذكي بعد إصلاح الهيدرز
          # ==============================================================
          MAX_CYCLE=$((5*3600 + 40*60))
          START_TIME=$(date +%s)

          # دالة الفحص بعد تمرير الـ User Agent والـ Headers لضمان عدم الحظر أو القراءة الخاطئة للبيانات
          check_source_alive() {
             if [ -n "$UA" ] && [ "$UA" != "null" ] && [ -n "$HEADERS" ]; then
                timeout 12 ffprobe -user_agent "$UA" -headers "$HEADERS" -v error -probesize 1000000 -analyzeduration 2000000 -i "$SOURCE_URL" > /dev/null 2>&1
             elif [ -n "$UA" ] && [ "$UA" != "null" ]; then
                timeout 12 ffprobe -user_agent "$UA" -v error -probesize 1000000 -analyzeduration 2000000 -i "$SOURCE_URL" > /dev/null 2>&1
             elif [ -n "$HEADERS" ]; then
                timeout 12 ffprobe -headers "$HEADERS" -v error -probesize 1000000 -analyzeduration 2000000 -i "$SOURCE_URL" > /dev/null 2>&1
             else
                timeout 12 ffprobe -v error -probesize 1000000 -analyzeduration 2000000 -i "$SOURCE_URL" > /dev/null 2>&1
             fi
             return $?
          }

          while true; do
            echo "🔍 جاري فحص حالة المصدر الأساسي وحجم البيانات..."
            if check_source_alive; then
                echo "✅ المصدر الأساسي مستقر ويجلب بيانات حقيقية! جاري تشغيل البث..."
                eval "$FFMPEG_MAIN_CMD" &
                CURRENT_PID=$!
                
                while kill -0 $CURRENT_PID 2>/dev/null; do
                    sleep 10
                    NOW=$(date +%s)
                    TOTAL_ELAPSED=$((NOW - START_TIME))
                    if [ $TOTAL_ELAPSED -ge $MAX_CYCLE ]; then
                        echo "🔄 إعادة تشغيل السيرفر تلقائياً للحفاظ على استمرارية الـ 24 ساعة..."
                        kill $CURRENT_PID 2>/dev/null || true
                        curl -X POST \
                          -H "Authorization: token $GITHUB_TOKEN" \
                          -H "Accept: application/vnd.github.v3+json" \
                          "https://api.github.com/repos/${REPO}/actions/workflows/stream.yml/dispatches" \
                          -d "{\"ref\":\"$REF_BRANCH\",\"inputs\":{\"stream_name\":\"$STREAM_NAME\",\"source_url\":\"$SOURCE_URL\",\"rtmp_url\":\"$RTMP_URL\",\"stream_key\":\"$STREAM_KEY\",\"logo_url\":\"$LOGO_URL\",\"resolution\":\"$RES\",\"fps\":\"$FPS\",\"bitrate\":\"$BITRATE\",\"user_agent\":\"$UA\",\"referer\":\"$REF\",\"origin\":\"$ORIGIN\"}}"
                        exit 0
                    fi
                done
                echo "⚠️ تحذير: انقطع المصدر الأساسي أو تجمّدت بياناته!"
            else
                echo "❌ المصدر متوقف أو حجم بياناته صفر. تشغيل بث الطوارئ (Mux 1080p)..."
                eval "$FFMPEG_FALLBACK_CMD" &
                CURRENT_PID=$!
                
                CHECK_TIMER=0
                while kill -0 $CURRENT_PID 2>/dev/null; do
                    sleep 5
                    CHECK_TIMER=$((CHECK_TIMER + 5))
                    
                    NOW=$(date +%s)
                    TOTAL_ELAPSED=$((NOW - START_TIME))
                    if [ $TOTAL_ELAPSED -ge $MAX_CYCLE ]; then
                        echo "🔄 إعادة تشغيل السيرفر تلقائياً للحفاظ على استمرارية الـ 24 ساعة..."
                        kill $CURRENT_PID 2>/dev/null || true
                        curl -X POST \
                          -H "Authorization: token $GITHUB_TOKEN" \
                          -H "Accept: application/vnd.github.v3+json" \
                          "https://api.github.com/repos/${REPO}/actions/workflows/stream.yml/dispatches" \
                          -d "{\"ref\":\"$REF_BRANCH\",\"inputs\":{\"stream_name\":\"$STREAM_NAME\",\"source_url\":\"$SOURCE_URL\",\"rtmp_url\":\"$RTMP_URL\",\"stream_key\":\"$STREAM_KEY\",\"logo_url\":\"$LOGO_URL\",\"resolution\":\"$RES\",\"fps\":\"$FPS\",\"bitrate\":\"$BITRATE\",\"user_agent\":\"$UA\",\"referer\":\"$REF\",\"origin\":\"$ORIGIN\"}}"
                        exit 0
                    fi
                    
                    if [ $CHECK_TIMER -ge 20 ]; then
                        CHECK_TIMER=0
                        echo "🔄 فحص المصدر الأساسي (كل 20 ثانية)..."
                        if check_source_alive; then
                            echo "🎉 عاد المصدر الأساسي لضخ البيانات! إيقاف الطوارئ والتحويل فوراً..."
                            kill $CURRENT_PID 2>/dev/null || true
                            break
                        fi
                    fi
                done
            fi
            sleep 2
          done
