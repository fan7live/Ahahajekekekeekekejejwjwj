name: Cancel and Delete All Workflow Runs

on:
  workflow_dispatch: # يتيح لك تشغيل السكريبت يدوياً بضغطة زر

env:
  # ⚠️ ضع التوكين الخاص بك هنا بين علامتي التنصيص
  MY_SUPER_TOKEN: "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"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Run Cleanup Script
        run: |
          # التحقق من تغيير التوكين الافتراضي
          if [ "${{ env.MY_SUPER_TOKEN }}" = "YOUR_PERSONAL_ACCESS_TOKEN_HERE" ] || [ -z "${{ env.MY_SUPER_TOKEN }}" ]; then
            echo "❌ خطأ: يرجى وضع التوكين الخاص بك في حقل MY_SUPER_TOKEN أولاً!"
            exit 1
          fi

          # تعيين التوكين لأداة GitHub CLI
          export GH_TOKEN="${{ env.MY_SUPER_TOKEN }}"
          REPO="${{ github.repository }}"
          
          echo "🔄 1. جاري إيقاف جميع الـ Workflows النشطة أو المنتظرة..."
          for status in in_progress queued; do
            runs=$(gh run list -R "$REPO" --status "$status" --json databaseId --jq '.[].databaseId')
            for run in $runs; do
              echo "🚫 إيقاف التشغيل رقم: $run"
              gh run cancel -R "$REPO" "$run" || true
            done
          done

          echo "⏳ الانتظار 5 ثوانٍ للتأكد من اكتمال الإلغاء..."
          sleep 5

          echo "🗑️ 2. جاري حذف تاريخ جميع الـ Workflow runs..."
          # يجلب أول 100 تشغيل (يمكنك زيادة الـ limit إذا كان العدد ضخماً)
          runs=$(gh run list -R "$REPO" --limit 100 --json databaseId --jq '.[].databaseId')
          
          if [ -z "$runs" ]; then
            echo "✅ لا توجد مسارات عمل متبقية لحذفها."
          else
            for run in $runs; do
              echo "❌ حذف السجل رقم: $run"
              gh run delete -R "$REPO" "$run" --yes || true
            done
            echo "✨ تم تنظيف وإيقاف جميع الـ Workflows بنجاح!"
          fi
